mcmc:
    steps: 1000
    samples: 500
    runs: 2
    warmup:
        warmup_steps: 1000

model:
    clusters: [1, 2]
    confounders:
        - confounder_1
    prior:
        cluster_assignment:
            type: logistic_normal
            logistic_normal_config:
                scale: 3
        geo:
            type: uniform
        weights:
               type: symmetric_dirichlet
               prior_concentration: 0.6
        cluster_effect:
                categorical:
                    type: symmetric_dirichlet
                    prior_concentration: 0.6
        confounding_effects:
            confounder_1:
                <DEFAULT>:
                    categorical:
                        type: symmetric_dirichlet
                        prior_concentration: 0.6
data: null
results:
    path: ../data/results
    log_file: False
    log_likelihood: False


simulation: true
